

services:
  db:
    image: postgres:15-alpine
    container_name: insurehealth-db
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: insurehealth
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser -d insurehealth"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: insurehealth-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  backend:
    build:
      context: ./
      dockerfile: Dockerfile.backend
    container_name: insurehealth-backend
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=postgresql://myuser:mypassword@db:5432/insurehealth
      - REDIS_URL=redis://redis:6379
      - PORT=3001
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: always

  frontend:
    build:
      context: ./
      dockerfile: Dockerfile.frontend
    container_name: insurehealth-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001
    depends_on:
      - backend
    restart: always

volumes:
  postgres_data:
  redis_data:
